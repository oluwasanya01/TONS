// ─── Design tokens ────────────────────────────────────────────────────────────
const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg:       #040608;
    --bg1:      #080c10;
    --bg2:      #0d1117;
    --bg3:      #111820;
    --bg4:      #161e28;
    --border:   rgba(255,255,255,0.06);
    --border2:  rgba(255,255,255,0.1);
    --text:     #e6edf3;
    --text2:    #8b949e;
    --text3:    #484f58;
    --green:    #39d98a;
    --green2:   #1a7a47;
    --yellow:   #e3b341;
    --orange:   #f0883e;
    --red:      #f85149;
    --blue:     #58a6ff;
    --purple:   #bc8cff;
    --cyan:     #39c5cf;
    --glow-g:   rgba(57,217,138,0.15);
    --glow-r:   rgba(248,81,73,0.15);
    --glow-y:   rgba(227,179,65,0.12);
    --glow-b:   rgba(88,166,255,0.12);
    --mono:     'Space Mono', monospace;
    --display:  'Space Grotesk', sans-serif;
    --heading:  'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: var(--display);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(57,217,138,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,217,138,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Ambient glows */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(57,217,138,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(88,166,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 40%, rgba(188,140,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; min-height: 100vh; padding: 0 0 120px; }

  /* ── Topbar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(4,6,8,0.8);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--heading); font-size: 15px; font-weight: 800; color: var(--text);
    letter-spacing: 0.5px;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--green), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #040608; font-weight: 700;
  }
  .topbar-status {
    display: flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11px; color: #ffffff;
    letter-spacing: 1px;
    transition: color 0.6s ease;
  }
  .topbar-status.sleeping { color: var(--text3); opacity: 0.55; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2.5s ease-in-out infinite;
    transition: background 0.8s ease, box-shadow 0.8s ease;
    flex-shrink: 0;
  }
  .status-dot.sleeping {
    background: var(--text3);
    box-shadow: none;
    animation: none;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes wake-pulse { 0%{box-shadow:0 0 0 0 rgba(57,217,138,0.7)} 70%{box-shadow:0 0 0 8px rgba(57,217,138,0)} 100%{box-shadow:0 0 0 0 rgba(57,217,138,0)} }
  .status-dot.waking { animation: wake-pulse 0.6s ease-out, blink 2.5s ease-in-out infinite 0.6s; }

  /* ── Hero ── */
  .hero {
    padding: 64px 32px 48px;
    max-width: 900px; margin: 0 auto;
    text-align: center;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--green); margin-bottom: 20px;
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid rgba(57,217,138,0.25);
    background: rgba(57,217,138,0.06);
  }
  .hero h1 {
    font-family: var(--heading); font-weight: 800;
    font-size: clamp(32px, 5.5vw, 58px);
    line-height: 1.05; letter-spacing: -1.5px; color: #fff;
    margin-bottom: 16px;
  }
  .hero h1 em { font-style: normal; color: var(--green); }
  .hero-sub {
    font-family: var(--display); font-size: 15px; font-weight: 600;
    color: #ffffff; max-width: 480px; line-height: 1.6;
    margin: 0 auto 40px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .hero-stats {
    display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
  }
  .hero-stat { text-align: center; }
  .hero-stat-num { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--green); }
  .hero-stat-label { font-size: 11px; color: #ffffff; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; font-weight: 600; }

  /* ── Main layout ── */
  .main { max-width: 900px; margin: 0 auto; padding: 0 20px; }

  /* ── API Config ── */
  .api-config {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px; margin-bottom: 20px;
  }
  .api-config-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .api-config-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: #ffffff;
    display: flex; align-items: center; gap: 8px;
  }
  .api-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width:600px) { .api-grid { grid-template-columns: 1fr; } }
  .api-input-wrap { position: relative; }
  .api-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: var(--mono); font-size: 11px; outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: rgba(57,217,138,0.3); }
  .api-input::placeholder { color: var(--text3); }
  .api-label { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .api-connected { color: var(--green); font-size: 9px; letter-spacing: 1px; }
  .session-badge { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:3px 9px; border-radius:10px; background:rgba(88,166,255,0.08); color:var(--blue); border:1px solid rgba(88,166,255,0.15); }
  .cache-chip { font-family:var(--mono); font-size:8px; padding:2px 6px; border-radius:6px; background:rgba(188,140,255,0.1); color:var(--purple); border:1px solid rgba(188,140,255,0.15); margin-left:6px; vertical-align:middle; }

  /* ── Plan badge ── */
  .plan-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 4px 11px; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .plan-badge.free {
    background: rgba(255,255,255,0.04); color: #ffffff;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .plan-badge.free:hover { background: rgba(255,255,255,0.08); color: var(--text2); }
  .plan-badge.pro {
    background: linear-gradient(135deg, rgba(57,217,138,0.15), rgba(88,166,255,0.1));
    color: var(--green); border: 1px solid rgba(57,217,138,0.3);
  }
  .plan-badge.pro:hover { background: linear-gradient(135deg, rgba(57,217,138,0.22), rgba(88,166,255,0.15)); }

  /* ── Usage counter ── */
  .usage-bar-wrap {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 9px; color: #ffffff; letter-spacing: 1px;
  }
  .usage-bar {
    width: 60px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.07); overflow: hidden;
  }
  .usage-fill {
    height: 100%; border-radius: 2px; transition: width 0.4s ease;
    background: linear-gradient(90deg, var(--green), var(--yellow));
  }
  .usage-fill.full { background: var(--red); }

  /* ── Upgrade modal overlay ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(4,6,8,0.88);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-card {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    max-width: 680px; width: 100%;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(57,217,138,0.08);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-header {
    padding: 32px 36px 24px;
    background: linear-gradient(135deg, rgba(57,217,138,0.06), rgba(88,166,255,0.04));
    border-bottom: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .modal-plans {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 28px 36px;
  }
  @media (max-width: 540px) { .modal-plans { grid-template-columns: 1fr; } }
  .plan-card {
    border-radius: 14px; padding: 24px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--bg3);
    position: relative; transition: border-color 0.2s;
  }
  .plan-card.featured {
    border-color: rgba(57,217,138,0.4);
    background: linear-gradient(145deg, rgba(57,217,138,0.06), var(--bg3));
    box-shadow: 0 0 30px rgba(57,217,138,0.06);
  }
  .plan-card:hover { border-color: rgba(255,255,255,0.16); }
  .plan-card.featured:hover { border-color: rgba(57,217,138,0.6); }
  .plan-tag {
    position: absolute; top: -1px; right: 18px;
    font-family: var(--mono); font-size: 8px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 0 0 8px 8px;
    background: var(--green); color: #040608;
  }
  .plan-name {
    font-family: var(--heading); font-weight: 800; font-size: 20px;
    margin-bottom: 4px; color: var(--text);
  }
  .plan-price {
    font-family: var(--mono); font-size: 26px; font-weight: 700;
    color: var(--green); margin-bottom: 16px; line-height: 1;
  }
  .plan-price span { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 400; }
  .plan-features { list-style: none; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .plan-features li {
    font-family: var(--display); font-size: 12px; color: #ffffff;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .feat-icon { color: var(--green); font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .feat-icon.dim { color: var(--text3); }
  .plan-btn {
    width: 100%; padding: 11px; border-radius: 10px; border: none;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s;
  }
  .plan-btn.current {
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.08); cursor: default;
  }
  .plan-btn.upgrade {
    background: var(--green); color: #040608;
  }
  .plan-btn.upgrade:hover { background: #4ef5a0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(57,217,138,0.3); }
  .plan-btn.downgrade {
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .plan-btn.downgrade:hover { border-color: rgba(255,255,255,0.2); color: var(--text2); }
  .modal-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none; color: rgba(255,255,255,0.7);
    font-size: 20px; cursor: pointer; line-height: 1;
    padding: 4px 8px; border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  /* ── Paystack Checkout ── */
  .checkout-overlay {
    position: fixed; inset: 0; z-index: 1100;
    background: rgba(4,6,8,0.92);
    backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  .checkout-card {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    max-width: 440px; width: 100%;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(57,217,138,0.06);
    animation: slideUp 0.25s ease;
  }
  .checkout-header {
    padding: 24px 28px 20px;
    background: linear-gradient(135deg, rgba(57,217,138,0.08), rgba(88,166,255,0.05));
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .checkout-body { padding: 24px 28px; }
  .checkout-label {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.6); margin-bottom: 6px;
    display: block;
  }
  .checkout-input {
    width: 100%; background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 12px 14px;
    font-family: var(--mono); font-size: 13px;
    color: #ffffff; outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  .checkout-input::placeholder { color: rgba(255,255,255,0.3); }
  .checkout-input:focus { border-color: rgba(57,217,138,0.5); box-shadow: 0 0 0 3px rgba(57,217,138,0.08); }
  .checkout-input.error { border-color: rgba(248,81,73,0.6); }
  .checkout-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkout-field { margin-bottom: 0; }
  .checkout-pay-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #39d98a, #2bc074);
    color: #040608; font-family: var(--mono); font-size: 13px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; margin-top: 18px;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .checkout-pay-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(57,217,138,0.35); }
  .checkout-pay-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .checkout-pay-btn.processing::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
  .paystack-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 14px; font-family: var(--mono); font-size: 9px;
    color: rgba(255,255,255,0.4); letter-spacing: 1px;
  }
  .paystack-logo-text {
    font-weight: 700; color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
  }
  .checkout-success {
    text-align: center; padding: 40px 28px;
  }
  .checkout-error-msg {
    background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.2);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
    font-family: var(--mono); font-size: 10px; color: var(--red); letter-spacing: 0.5px;
  }
  .card-type-icon {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: rgba(255,255,255,0.4); font-family: var(--mono);
    pointer-events: none;
  }
  .input-with-icon { position: relative; }
  .security-chips {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
  }
  .security-chip {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
    color: rgba(255,255,255,0.45); padding: 3px 8px; border-radius: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  }

  /* ── Paywall gate ── */
  .paywall-gate {
    border: 1px solid rgba(227,179,65,0.25);
    border-radius: 14px; padding: 28px 24px;
    background: linear-gradient(135deg, rgba(227,179,65,0.05), rgba(248,81,73,0.03));
    text-align: center; margin-top: 12px;
  }

  /* ── Input zone ── */
  .input-zone {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; margin-bottom: 20px;
    position: relative; overflow: visible;
  }
  .input-zone-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: #ffffff; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px; font-weight: 700;
  }
  .input-main-row { display: flex; gap: 10px; align-items: flex-start; position: relative; }
  .email-input-wrap { flex: 1; position: relative; }
  .email-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 14px; padding: 16px 20px; color: var(--text);
    font-family: var(--mono); font-size: 14px; outline: none;
    transition: all 0.25s; letter-spacing: 0.3px;
    caret-color: var(--green);
  }
  .email-input:focus { border-color: rgba(57,217,138,0.4); box-shadow: 0 0 0 3px rgba(57,217,138,0.07), inset 0 1px 0 rgba(255,255,255,0.03); }
  .email-input.has-value { border-color: rgba(57,217,138,0.2); }
  .email-input.is-valid { border-color: rgba(57,217,138,0.5); }
  .email-input.is-invalid { border-color: rgba(248,81,73,0.4); }
  .email-input::placeholder { color: rgba(255,255,255,0.45); font-size: 13px; }

  /* Suggestions dropdown */
  .suggestions-drop {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200;
    background: var(--bg3); border: 1px solid rgba(57,217,138,0.25);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(57,217,138,0.1);
    animation: dropIn 0.18s ease;
  }
  @keyframes dropIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .suggestion-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 16px; cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active { background: rgba(57,217,138,0.08); }
  .sug-email { font-family: var(--mono); font-size: 13px; color: var(--text); flex: 1; }
  .sug-email strong { color: var(--green); }
  .sug-provider { font-size: 10px; color: rgba(255,255,255,0.65); font-family: var(--mono); }
  .sug-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; background: rgba(57,217,138,0.1); color: var(--green); border: 1px solid rgba(57,217,138,0.2); letter-spacing: 1px; }

  /* inline validation indicator */
  .input-indicator {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 13px; pointer-events: none; transition: all 0.2s;
  }

  .verify-btn {
    background: var(--green); color: #040608; border: none; border-radius: 14px;
    padding: 16px 28px; font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .verify-btn:hover { background: #4deea0; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(57,217,138,0.35); }
  .verify-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Mode tabs */
  .mode-tabs { display: flex; gap: 6px; margin-top: 18px; }
  .mode-tab {
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: rgba(255,255,255,0.65); font-family: var(--mono);
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .mode-tab.active { background: rgba(57,217,138,0.1); color: var(--green); border-color: rgba(57,217,138,0.25); }
  .mode-tab:hover:not(.active) { color: #ffffff; border-color: var(--border2); }

  .bulk-area {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none; resize: vertical;
    min-height: 130px; margin-top: 14px; transition: border-color 0.2s;
    caret-color: var(--green); line-height: 1.7;
  }
  .bulk-area:focus { border-color: rgba(57,217,138,0.3); }
  .bulk-area::placeholder { color: rgba(255,255,255,0.4); }
  .bulk-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

  /* ── Progress ── */
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; margin: 16px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #4deea0); border-radius: 2px; transition: width 0.3s ease; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    transition: all 0.15s; letter-spacing: 0.5px;
    border: 1px solid transparent;
  }
  .stat-pill.active { transform: translateY(-1px); }
  .sp-all      { background: rgba(255,255,255,0.04); color: #ffffff; border-color: var(--border2); }
  .sp-all.active { background: rgba(255,255,255,0.08); color: var(--text); }
  .sp-valid    { background: rgba(57,217,138,0.07); color: var(--green); border-color: rgba(57,217,138,0.2); }
  .sp-valid.active { background: rgba(57,217,138,0.15); box-shadow: 0 4px 16px rgba(57,217,138,0.2); }
  .sp-risky    { background: rgba(227,179,65,0.07); color: var(--yellow); border-color: rgba(227,179,65,0.2); }
  .sp-risky.active { background: rgba(227,179,65,0.15); }
  .sp-invalid  { background: rgba(248,81,73,0.07); color: var(--red); border-color: rgba(248,81,73,0.2); }
  .sp-invalid.active { background: rgba(248,81,73,0.15); }
  .sp-inactive { background: rgba(188,140,255,0.07); color: var(--purple); border-color: rgba(188,140,255,0.2); }
  .sp-inactive.active { background: rgba(188,140,255,0.15); }
  .stat-pill .pill-count { font-size: 13px; }
  .avg-score-chip {
    margin-left: auto; font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; gap: 6px;
  }
  .avg-val { color: var(--green); font-weight: 700; font-size: 14px; }

  /* Results header */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .results-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #ffffff; }

  /* ── Result cards ── */
  .results-grid { display: flex; flex-direction: column; gap: 8px; }

  .result-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    animation: cardIn 0.3s ease forwards;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .result-card:hover { border-color: var(--border2); }
  @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .result-card.s-valid    { border-left: 3px solid var(--green); }
  .result-card.s-risky    { border-left: 3px solid var(--yellow); }
  .result-card.s-invalid  { border-left: 3px solid var(--red); }
  .result-card.s-inactive { border-left: 3px solid var(--purple); }
  .result-card.s-checking { border-left: 3px solid var(--bg4); }
  .result-card.s-valid:hover   { box-shadow: 0 0 0 1px rgba(57,217,138,0.15), 0 8px 32px rgba(57,217,138,0.06); }
  .result-card.s-invalid:hover { box-shadow: 0 0 0 1px rgba(248,81,73,0.15), 0 8px 32px rgba(248,81,73,0.06); }

  .card-main { display: flex; align-items: center; gap: 16px; padding: 16px 20px 12px; }

  /* Score ring SVG */
  .ring-wrap { flex-shrink: 0; position: relative; }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 700; }

  .card-info { flex: 1; min-width: 0; }
  .card-email { font-family: var(--mono); font-size: 13px; color: var(--text); word-break: break-all; font-weight: 500; }
  .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .card-domain { font-size: 11px; color: rgba(255,255,255,0.7); }
  .provider-tag { font-size: 9px; padding: 2px 7px; border-radius: 6px; background: rgba(88,166,255,0.1); color: var(--blue); border: 1px solid rgba(88,166,255,0.15); font-family: var(--mono); letter-spacing: 0.5px; }
  .disposable-tag { background: rgba(248,81,73,0.1); color: var(--red); border-color: rgba(248,81,73,0.2); }
  .dead-tag { background: rgba(188,140,255,0.1); color: var(--purple); border-color: rgba(188,140,255,0.2); }


  .status-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
  .sb-valid    { background: rgba(57,217,138,0.1);  color: var(--green);  border: 1px solid rgba(57,217,138,0.2); }
  .sb-risky    { background: rgba(227,179,65,0.1);  color: var(--yellow); border: 1px solid rgba(227,179,65,0.2); }
  .sb-invalid  { background: rgba(248,81,73,0.1);   color: var(--red);    border: 1px solid rgba(248,81,73,0.2); }
  .sb-inactive { background: rgba(188,140,255,0.1); color: var(--purple); border: 1px solid rgba(188,140,255,0.2); }
  .sb-checking { background: rgba(30,41,59,0.5);    color: rgba(255,255,255,0.7);  border: 1px solid var(--border); }

  /* Score bar */
  .score-bar-wrap { padding: 0 20px 10px; }
  .score-bar-track { height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.7s cubic-bezier(.16,1,.3,1); }

  /* Signals */
  .signals { display: flex; gap: 6px; padding: 0 20px 12px; flex-wrap: wrap; }
  .sig { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
  .sig-pass { background: rgba(57,217,138,0.07);  color: var(--green);  border: 1px solid rgba(57,217,138,0.15); }
  .sig-warn { background: rgba(227,179,65,0.07);  color: var(--yellow); border: 1px solid rgba(227,179,65,0.15); }
  .sig-fail { background: rgba(248,81,73,0.07);   color: var(--red);    border: 1px solid rgba(248,81,73,0.15); }
  .sig-info { background: rgba(88,166,255,0.07);  color: var(--blue);   border: 1px solid rgba(88,166,255,0.15); }

  /* DNS details */
  .dns-row { display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap; }
  .dns-chip { font-family: var(--mono); font-size: 9px; padding: 3px 10px; border-radius: 6px; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
  .dns-ok   { background: rgba(57,217,138,0.06);  color: var(--green);  border: 1px solid rgba(57,217,138,0.12); }
  .dns-warn { background: rgba(227,179,65,0.06);  color: var(--yellow); border: 1px solid rgba(227,179,65,0.12); }
  .dns-fail { background: rgba(248,81,73,0.06);   color: var(--red);    border: 1px solid rgba(248,81,73,0.12); }
  .dns-skip { background: rgba(100,116,139,0.08); color: rgba(255,255,255,0.65);  border: 1px solid var(--border); }

  /* AI block */
  .ai-block { margin: 0 20px 14px; padding: 12px 16px; border-radius: 12px; background: rgba(88,166,255,0.05); border: 1px solid rgba(88,166,255,0.12); }
  .ai-label-row { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #5b8dd9; }
  .ai-text { font-size: 12px; color: #9bb3d4; line-height: 1.7; font-weight: 300; }
  .ai-spin { width:9px;height:9px;border:1.5px solid rgba(88,166,255,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Empty state */
  .empty { text-align: center; padding: 70px 20px; color: var(--bg4); }
  .empty-icon { font-size: 48px; margin-bottom: 14px; filter: grayscale(1) opacity(0.5); }
  .empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #ffffff; font-weight: 600; }

  /* Buttons */
  .btn {
    padding: 12px 22px; border-radius: 12px; border: none;
    font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--green); color: #040608; }
  .btn-primary:hover { background: #4deea0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(57,217,138,0.3); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost { background: var(--bg3); color: #ffffff; border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--bg4); color: var(--text); }

  /* Legend */
  .legend { display: flex; gap: 20px; flex-wrap: wrap; padding: 20px 0 0; border-top: 1px solid var(--border); margin-top: 20px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 9px; color: #ffffff; letter-spacing: 1px; text-transform: uppercase; }
  .ldot { width: 7px; height: 7px; border-radius: 50%; }

  /* Responsive */
  @media(max-width:640px) {
    .topbar { padding: 14px 16px; }
    .hero { padding: 40px 16px 32px; }
    .hero-stats { gap: 24px; }
    .main { padding: 0 12px; }
    .input-zone { padding: 20px 16px; }
    .api-config { padding: 16px; }
    .verify-btn { padding: 14px 18px; font-size: 10px; }
    .card-main { padding: 12px 14px 10px; gap: 10px; }
    .card-email { font-size: 12px; }
    .hero h1 { font-size: 28px; }
    .hero-stat-num { font-size: 18px; }
  }
`;

// ─── DNS via Cloudflare + Google Public DNS (dual resolver, race + fallback) ──
//
// Strategy:
//   1. Fire both resolvers simultaneously — race them.
//   2. First valid response wins (fastest resolver on that query wins).
//   3. If the winner fails/times out, the other result is used as fallback.
//   4. Only return null if BOTH resolvers fail.

const DNS_RESOLVERS = [{
  name: "Cloudflare",
  url: (domain, type) => `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${type}`
}, {
  name: "Google",
  url: (domain, type) => `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=${type}`
}];
async function queryResolver(resolver, domain, type, timeoutMs = 5000) {
  try {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), timeoutMs);
    const res = await fetch(resolver.url(domain, type), {
      headers: {
        Accept: "application/dns-json"
      },
      signal: controller.signal
    });
    clearTimeout(t);
    if (!res.ok) return null;
    const data = await res.json();
    // Return only if it's a meaningful response (not SERVFAIL noise)
    return data && typeof data.Status === "number" ? data : null;
  } catch {
    return null;
  }
}
async function dnsQuery(domain, type) {
  // Race both resolvers — first valid answer wins
  const [cf, goog] = await Promise.all([queryResolver(DNS_RESOLVERS[0], domain, type), queryResolver(DNS_RESOLVERS[1], domain, type)]);
  // Prefer whichever resolved successfully; if both did, prefer Cloudflare
  // (slightly lower latency in most regions); fall back to Google if CF failed
  return cf ?? goog ?? null;
}

/*
 * STATUS TIERS (returned as `domainStatus`):
 *   "valid"       — domain has MX, no deactivation signals
 *   "deactivated" — domain exists, had mail, but signals suggest disabled/bouncing → RISKY
 *   "dormant"     — domain exists (has A/NS) but never set up for mail → INACTIVE

 *   "unknown"     — DNS unavailable / timeout

async function resolveDomain(domain) {

      hasA: true,

      knownGood: true,
      domainStatus: "valid"

    return {
      hasMX: false,
      hasA: false,
      isParked: false,
      nxDomain: true,
      domainExists: false,
      mxRecords: [],
      dnsAvailable: true,
      knownGood: false,
      domainStatus: "nonexistent"

  }

  ]);

  // DNS completely unreachable

    return {
      hasMX: null,
      hasA: null,
      isParked: false,
      nxDomain: false,
      domainExists: null,
      mxRecords: [],
      dnsAvailable: false,
      knownGood: false,
      domainStatus: "unknown"
    };
  }
  const hasMX = mx?.Status === 0 && mx?.Answer?.length > 0;
  const hasA = a?.Status === 0 && a?.Answer?.length > 0;
  const hasNS = ns?.Status === 0 && ns?.Answer?.length > 0;

  // ── MX priority intelligence (Improvement #1) ────────────────────────────
  // Raw MX records include priority: "10 aspmx.l.google.com"
  const mxRaw = hasMX ? mx.Answer : [];
  const mxParsed = mxRaw.map(r => {
    const parts = (r.data || "").trim().split(/\s+/);
    const priority = parts.length >= 2 ? parseInt(parts[0], 10) : 10;
    const host = (parts.length >= 2 ? parts.slice(1).join(" ") : parts[0]).toLowerCase().trim();
    return {
      priority: isNaN(priority) ? 10 : priority,
      host,
      ttl: r.TTL || 300
    };
  }).filter(r => r.host);
  // Sort by priority ascending (lower = higher priority)
  mxParsed.sort((a, b) => a.priority - b.priority);
  const mxRecords = mxParsed.map(r => r.host);
  // MX reliability score: more MX hosts + lower min priority = more robust
  const mxCount = mxParsed.length;
  const mxMinPriority = mxParsed.length ? mxParsed[0].priority : 999;
  const mxReliability = mxCount >= 3 ? "high" : mxCount === 2 ? "medium" : mxCount === 1 ? "single" : "none";
  const nsRecords = hasNS ? ns.Answer.map(r => (r.data || "").toLowerCase().trim()) : [];
  const txtRecords = (txt?.Answer || []).map(r => (r.data || "").toLowerCase());

  // ── DMARC parsing (Improvement #2) ───────────────────────────────────────
  const dmarcRecords = (dmarc?.Answer || []).map(r => (r.data || "").toLowerCase());
  const dmarcStr = dmarcRecords.join(" ");
  const hasDMARC = dmarcStr.includes("v=dmarc1");
  let dmarcPolicy = null;
  let dmarcStrength = "none"; // none | monitor | quarantine | reject
  if (hasDMARC) {
    const pMatch = dmarcStr.match(/p=(none|quarantine|reject)/);
    dmarcPolicy = pMatch ? pMatch[1] : "none";
    dmarcStrength = dmarcPolicy === "reject" ? "strict" : dmarcPolicy === "quarantine" ? "moderate" : "monitor";
  }

  const mxStr = mxRecords.join(" ");
  const txtStr = txtRecords.join(" ");

  // ── NXDOMAIN: domain flat-out does not exist ──────────────────────────────
  const nxDomain = mx?.Status === 3 && (a === null || a?.Status === 3);
  if (nxDomain) {
    return {
      hasMX: false,
      hasA: false,
      isParked: false,
      nxDomain: true,
      domainExists: false,
      mxRecords: [],
      dnsAvailable: true,
      knownGood: false,
      domainStatus: "nonexistent"
    };
  }

  // ── Domain registered but no records at all ──────────────────────────────
  if (!hasMX && !hasA && !hasNS) {
    return {
      hasMX: false,
      hasA: false,
      isParked: false,
      nxDomain: false,
      domainExists: false,
      mxRecords: [],
      dnsAvailable: true,
      knownGood: false,
      domainStatus: "nonexistent",
      hint: "No DNS records — domain possibly expired or never configured"
    };
  }

  // ── Parked domain (NS matches parking service) ────────────────────────────
  const isParked = PARKED_NS.some(p => nsStr.includes(p) || mxStr.includes(p));

  // ── DEACTIVATED signals: domain exists + had email infra, but now disabled ─
  // Signals: null/reject MX, "v=spf1 -all", catch-all-trap MX hosts

  const hasRejectSPF = REJECT_SPF.some(s => txtStr.includes(s));

  const hasNullMX = hasMX && mxRecords.some(r => r === "." || r === "0 ." || r.startsWith("null") || r.startsWith("discard"));
  // SPF -all with no MX = mail explicitly rejected
  const spfRejectNoMX = !hasMX && txtStr.includes("v=spf1") && (txtStr.includes(" -all") || txtStr.includes("~all"));
  if (hasDeactivatedMX || hasNullMX || hasRejectSPF && hasMX || spfRejectNoMX && hasA) {
    return {
      hasMX,
      hasA,
      isParked,
      nxDomain: false,
      domainExists: true,
      mxRecords,
      dnsAvailable: true,
      knownGood: false,
      domainStatus: "deactivated",
      hint: hasNullMX ? "Null MX record — domain explicitly rejects email" : hasDeactivatedMX ? "MX host signals disabled mailboxes" : "SPF policy rejects all inbound mail"
    };
  }

  // ── DORMANT: domain is registered, has A/NS, but NEVER configured email ──
  // No MX, no SPF, no prior mail indicators
  if (!hasMX && (hasA || hasNS)) {
    const hasAnySPF = txtStr.includes("v=spf1");
    const isDormant = !hasAnySPF; // no mail infra ever set up
    const isParkedDomain = isParked || DORMANT_MX_SIGNALS.some(s => nsStr.includes(s));
    return {
      hasMX: false,
      hasA,
      isParked: isParkedDomain,
      nxDomain: false,
      domainExists: true,
      mxRecords: [],
      dnsAvailable: true,
      knownGood: false,
      domainStatus: isParkedDomain ? "dormant" : isDormant ? "dormant" : "deactivated",
      hint: isParkedDomain ? "Domain is parked / for sale" : isDormant ? "Domain exists but has never been configured for email" : "Email infrastructure removed or disabled"
    };
  }

  // ── VALID: has MX, not flagged ────────────────────────────────────────────
  const catchAll = await detectCatchAll(domain, mxRecords, txtStr);
  return {
    hasMX: true,
    hasA,
    isParked,
    nxDomain: false,
    domainExists: true,
    mxRecords,
    mxParsed,
    mxCount,
    mxReliability,
    dnsAvailable: true,
    knownGood: false,
    domainStatus: "valid",
    hasDMARC,
    dmarcPolicy,
    dmarcStrength,
    catchAll: catchAll.isCatchAll,
    catchAllConfidence: catchAll.confidence,
    catchAllReason: catchAll.reason,
    hint: mxRecords.length > 0 ? `Mail handled by: ${mxRecords[0]}` : null
  };
}
